services:
  bridge:
    build: .
    image: pebblegram-bridge:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE:-}
      TELEGRAM_SESSION: /data/pebblegram
      TELEGRAM_ALLOW_READ_CONTENT: ${TELEGRAM_ALLOW_READ_CONTENT:-1}
      TELEGRAM_ALLOW_SEND: ${TELEGRAM_ALLOW_SEND:-1}
      TELEGRAM_ALLOW_DELETE: ${TELEGRAM_ALLOW_DELETE:-0}
      PEBBLEGRAM_TOKEN: ${PEBBLEGRAM_TOKEN:-}
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - bridge
    environment:
      PEBBLEGRAM_DOMAIN: ${PEBBLEGRAM_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
