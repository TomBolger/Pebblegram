<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pebblegram Settings</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #111827;
    }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 18px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 700;
    }
    .lede {
      margin: 0 0 16px;
      color: #475569;
      font-size: 14px;
      line-height: 1.4;
    }
    label {
      display: block;
      margin: 16px 0 6px;
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 11px;
      font: inherit;
      background: #fff;
    }
    input:disabled {
      color: #64748b;
      background: #e5e7eb;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
    }
    .reply-row {
      margin-top: 8px;
    }
    .hint {
      margin-top: 6px;
      color: #64748b;
      font-size: 13px;
      line-height: 1.4;
    }
    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #0f766e;
      min-height: 18px;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    button {
      flex: 1;
      border: 0;
      border-radius: 6px;
      background: #1683d8;
      color: #fff;
      padding: 13px;
      font: inherit;
      font-weight: 700;
    }
    button.secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
    button.inline {
      width: 100%;
      margin-top: 10px;
      background: #0f172a;
    }
    button:disabled {
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pebblegram</h1>
    <p class="lede">Sign in with your Telegram API credentials and phone number, then enter the login code.</p>

    <label for="apiId">Telegram API ID</label>
    <input id="apiId" type="text" inputmode="numeric" placeholder="12345">

    <label for="apiHash">Telegram API hash</label>
    <input id="apiHash" type="password" placeholder="Required for first setup">

    <label for="phone">Phone number</label>
    <input id="phone" type="tel" placeholder="+15551234567">
    <div class="hint">Save once with your phone number to request the Telegram login code.</div>

    <label for="code">Telegram login code</label>
    <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="12345">

    <label>Canned replies</label>
    <div id="cannedReplies"></div>
    <button id="addReply" class="inline" type="button">Add a canned message</button>

    <div class="row">
      <button id="reset" class="secondary" type="button">Log out</button>
      <button id="save" type="button">Save</button>
    </div>
    <div id="status" class="status"></div>
  </main>

  <script>
    function params() {
      var result = {};
      function read(raw) {
        raw.split('&').forEach(function(part) {
          if (!part) return;
          var separator = part.indexOf('=');
          var key = separator === -1 ? part : part.substring(0, separator);
          var value = separator === -1 ? '' : part.substring(separator + 1);
          result[decodeURIComponent(key)] = decodeURIComponent(value.replace(/\+/g, ' '));
        });
      }
      if (window.location.search) {
        read(window.location.search.substring(1));
      }
      if (window.location.hash) {
        read(window.location.hash.substring(1));
      }
      return result;
    }

    var query = params();
    var apiId = document.getElementById('apiId');
    var apiHash = document.getElementById('apiHash');
    var phone = document.getElementById('phone');
    var code = document.getElementById('code');
    var cannedReplies = document.getElementById('cannedReplies');
    var addReply = document.getElementById('addReply');
    var status = document.getElementById('status');
    var resetSession = false;
    var maxReplies = 10;

    apiId.value = query.apiId || '';
    if (query.hasApiHash === '1') {
      apiHash.placeholder = 'Saved';
    }
    phone.value = query.phone || '';

    function replyValues() {
      return Array.prototype.map.call(cannedReplies.querySelectorAll('input'), function(input) {
        return input.value.trim();
      }).filter(function(value) {
        return value.length > 0;
      });
    }

    function updateAddButton() {
      addReply.disabled = cannedReplies.querySelectorAll('input').length >= maxReplies;
    }

    function addReplyField(value) {
      if (cannedReplies.querySelectorAll('input').length >= maxReplies) {
        return;
      }
      var input = document.createElement('input');
      input.className = 'reply-row';
      input.type = 'text';
      input.maxLength = 39;
      input.placeholder = 'Canned message';
      input.value = value || '';
      cannedReplies.appendChild(input);
      updateAddButton();
    }

    (query.cannedReplies || 'Yes|No|On my way|Call you later|Thanks').split('|').slice(0, maxReplies).forEach(function(value) {
      addReplyField(value);
    });
    while (cannedReplies.querySelectorAll('input').length < 5) {
      addReplyField('');
    }

    if (query.hasSession === '1') {
      status.textContent = 'Telegram session saved.';
      apiId.disabled = true;
      apiHash.disabled = true;
      phone.disabled = true;
      code.disabled = true;
    } else if (query.authStage === 'code') {
      status.textContent = 'Enter the Telegram login code.';
      code.focus();
    }

    function closeWith(data) {
      var returnTo = query.return_to || 'pebblejs://close#';
      var separator = returnTo.indexOf('#') === -1 ? '#' : '';
      document.location = returnTo + separator + encodeURIComponent(JSON.stringify(data));
    }

    document.getElementById('reset').addEventListener('click', function() {
      resetSession = true;
      apiId.disabled = false;
      apiHash.disabled = false;
      phone.disabled = false;
      code.disabled = false;
      status.textContent = 'You will be logged out when you save.';
    });

    addReply.addEventListener('click', function() {
      addReplyField('');
    });

    document.getElementById('save').addEventListener('click', function() {
      var data = {
        mode: 'pgjs',
        apiId: apiId.value.trim(),
        phone: phone.value.trim(),
        code: code.value.trim(),
        cannedReplies: replyValues().join('|'),
        resetSession: resetSession
      };
      if (apiHash.value.trim()) {
        data.apiHash = apiHash.value.trim();
      }
      if (query.hasSession !== '1' && !data.apiId) {
        status.textContent = 'Enter your Telegram API ID.';
        return;
      }
      if (query.hasSession !== '1' && query.hasApiHash !== '1' && !data.apiHash) {
        status.textContent = 'Enter your Telegram API hash.';
        return;
      }
      if (query.hasSession !== '1' && !data.phone) {
        status.textContent = 'Enter your phone number.';
        return;
      }
      closeWith(data);
    });
  </script>
</body>
</html>
